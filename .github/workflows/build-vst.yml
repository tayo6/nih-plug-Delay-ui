name: Build Windows VST3

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Build VST3 Plugin
      # THIS IS THE LINE WE FIXED:
      run: cargo run --package xtask -- bundle delay-vst --release

    - name: Upload VST3 for Download
      uses: actions/upload-artifact@v4
      with:
        name: Delay-Plugin-Windows-VST3
        path: target/bundled/**/*.vst3